<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | Dr. Fixit Mobile</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <style>
    .success-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 100px 5% 60px; background: var(--bg-muted);
    }
    .success-card {
      background: var(--bg-card); border: 1.5px solid #bbf7d0;
      border-radius: 24px; padding: 3rem 2.75rem; width: 100%; max-width: 460px;
      box-shadow: var(--shadow-lg); text-align: center;
    }
    .success-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: #dcfce7; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 2.2rem; color: #16a34a;
    }
    .success-title { font-size: 1.7rem; font-weight: 800; margin-bottom: .6rem; color: var(--text); }
    .success-sub { color: var(--text-muted); font-size: .95rem; line-height: 1.7; margin-bottom: 2rem; }
    .success-ref { background: var(--bg-muted); border-radius: 10px; padding: .75rem 1rem; font-size: .82rem; color: var(--text-muted); margin-bottom: 2rem; }
    .success-ref strong { color: var(--text); font-family: 'Space Mono', monospace; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="logo.jpg" alt="Dr. Fixit Mobile" class="logo-img">
  </a>
  <a href="tel:6477604786" class="nav-phone"><i class="fas fa-phone"></i> (647) 760-4786</a>
</nav>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon"><i class="fas fa-circle-check"></i></div>
    <h1 class="success-title">Payment Approved!</h1>
    <p class="success-sub">
      Your Sezzle payment plan has been set up successfully. You will receive a confirmation email from Sezzle with your payment schedule.
    </p>
    <div class="success-ref">
      Reference: <strong id="refId">—</strong>
    </div>
    <a href="index.html" class="btn-primary" style="width:100%;justify-content:center;">
      <i class="fas fa-house"></i> Back to Home
    </a>
    <p style="margin-top:1.25rem;font-size:.8rem;color:var(--text-muted);">
      Questions? Call us at <a href="tel:6477604786" style="color:var(--primary);font-weight:600;">(647) 760-4786</a>
    </p>
  </div>
</div>

<script>
  const ref = new URLSearchParams(window.location.search).get('ref');
  if (ref) document.getElementById('refId').textContent = ref;
</script>
</body>
</html>
